<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Level OS Concepts Lab</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX Transpilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes slide-right { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .animate-slide-right { animation: slide-right 2s linear infinite; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons Helper (Simulating Lucide-React) ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = lucide.createIcons({
                        icons: { [name]: {} },
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-block" />;
        };

        const TOTAL_RAM = 1024;
        const FIXED_SLOT_SIZE = 128;

        // --- Memory Lab Component ---
        const MemoryLab = () => {
            const [mode, setMode] = useState('fixed');
            const [processes, setProcesses] = useState([]);
            const [inputSize, setInputSize] = useState(100);
            const [error, setError] = useState('');

            const addProcess = () => {
                setError('');
                if (inputSize <= 0) return;
                if (mode === 'fixed') {
                    if (inputSize > FIXED_SLOT_SIZE) {
                        setError(`Process too large! Max slot size is ${FIXED_SLOT_SIZE}MB.`);
                        return;
                    }
                    const occupied = processes.map(p => p.slotIndex);
                    let target = -1;
                    for (let i = 0; i < 8; i++) { if (!occupied.includes(i)) { target = i; break; } }
                    if (target === -1) setError('No free partitions!');
                    else setProcesses([...processes, { id: Date.now(), size: inputSize, slotIndex: target }]);
                } else {
                    const sorted = [...processes].sort((a, b) => a.offset - b.offset);
                    let offset = 0; let placed = false;
                    for (let p of sorted) {
                        if (p.offset - offset >= inputSize) {
                            setProcesses([...processes, { id: Date.now(), size: inputSize, offset }]);
                            placed = true; break;
                        }
                        offset = p.offset + p.size;
                    }
                    if (!placed) {
                        if (TOTAL_RAM - offset >= inputSize) setProcesses([...processes, { id: Date.now(), size: inputSize, offset }]);
                        else setError('External Fragmentation: No large enough contiguous block!');
                    }
                }
            };

            const defragment = () => {
                let offset = 0;
                setProcesses([...processes].sort((a, b) => a.offset - b.offset).map(p => {
                    const newP = { ...p, offset };
                    offset += p.size;
                    return newP;
                }));
            };

            return (
                <div className="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="space-y-6">
                        <section>
                            <h3 className="text-lg font-bold mb-3 flex items-center gap-2"><Icon name="Database" className="text-indigo-600" /> Allocation Method</h3>
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => {setMode('fixed'); setProcesses([]);}} className={`flex-1 py-2 rounded-md text-sm font-medium ${mode === 'fixed' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Fixed</button>
                                <button onClick={() => {setMode('dynamic'); setProcesses([]);}} className={`flex-1 py-2 rounded-md text-sm font-medium ${mode === 'dynamic' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Dynamic</button>
                            </div>
                        </section>
                        <section className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <h3 className="font-bold mb-3 text-sm text-slate-400">Add Process (MB)</h3>
                            <div className="flex gap-2">
                                <input type="number" value={inputSize} onChange={e => setInputSize(Number(e.target.value))} className="flex-1 px-3 py-2 border rounded-lg" />
                                <button onClick={addProcess} className="bg-indigo-600 text-white px-4 py-2 rounded-lg">Load</button>
                            </div>
                            {error && <p className="text-red-500 text-[10px] mt-2 italic">{error}</p>}
                        </section>
                        {mode === 'dynamic' && <button onClick={defragment} className="w-full py-3 border-2 border-dashed border-indigo-200 text-indigo-600 rounded-xl font-medium flex items-center justify-center gap-2"><Icon name="RotateCcw" /> Defragment</button>}
                    </div>
                    <div className="lg:col-span-2 relative w-full h-[450px] bg-slate-200 rounded-xl overflow-hidden border-2 border-slate-300">
                        {mode === 'fixed' ? (
                            <div className="grid grid-rows-8 h-full">
                                {Array.from({ length: 8 }).map((_, i) => {
                                    const p = processes.find(p => p.slotIndex === i);
                                    return (
                                        <div key={i} className="border-b border-slate-300 relative group">
                                            {p ? (
                                                <div className="h-full flex">
                                                    <div style={{ width: `${(p.size / 128) * 100}%` }} className="bg-indigo-500 h-full flex items-center justify-between px-4 text-white font-bold text-xs">
                                                        <span>P_{p.id.toString().slice(-3)}</span>
                                                        <button onClick={() => setProcesses(processes.filter(x => x.id !== p.id))}><Icon name="Trash2" size={14} /></button>
                                                    </div>
                                                    <div className="flex-1 bg-red-100 flex items-center justify-center text-[10px] text-red-400 font-bold">Internal Frag</div>
                                                </div>
                                            ) : <div className="h-full flex items-center justify-center text-slate-300 text-xs italic">Empty Partition</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="h-full relative">
                                {processes.map(p => (
                                    <div key={p.id} style={{ top: `${(p.offset / 1024) * 100}%`, height: `${(p.size / 1024) * 100}%` }} className="absolute left-0 right-0 bg-indigo-500 border-b border-indigo-600 flex items-center justify-between px-4 text-white font-bold text-sm">
                                        <span>Process {p.id.toString().slice(-3)} ({p.size}MB)</span>
                                        <button onClick={() => setProcesses(processes.filter(x => x.id !== p.id))}><Icon name="Trash2" /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Buffer Lab Component ---
        const BufferLab = () => {
            const [isDouble, setIsDouble] = useState(false);
            const [bufferA, setBufferA] = useState(0);
            const [bufferB, setBufferB] = useState(0);
            const [activeBuf, setActiveBuf] = useState('A');
            const [isRunning, setIsRunning] = useState(false);
            const [isDraining, setIsDraining] = useState(false);
            const [cpuState, setCpuState] = useState('IDLE');
            const [stats, setStats] = useState({ transferred: 0, wait: 0 });

            useEffect(() => {
                let timer;
                if (isRunning) {
                    timer = setInterval(() => {
                        // Producer
                        if (!isDouble) {
                            if (!isDraining && bufferA < 100) {
                                setCpuState('FILLING');
                                setBufferA(v => { const n = v + 5; if (n >= 100) setIsDraining(true); return Math.min(100, n); });
                            } else {
                                setCpuState('WAITING');
                                setStats(s => ({ ...s, wait: s.wait + 1 }));
                            }
                        } else {
                            const target = activeBuf === 'A' ? 'B' : 'A';
                            const val = target === 'A' ? bufferA : bufferB;
                            if (val < 100) {
                                setCpuState('FILLING');
                                if (target === 'A') setBufferA(v => Math.min(100, v + 5)); else setBufferB(v => Math.min(100, v + 5));
                            } else {
                                setCpuState('WAITING');
                                setStats(s => ({ ...s, wait: s.wait + 1 }));
                            }
                        }
                        // Consumer
                        const drainVal = activeBuf === 'A' ? bufferA : bufferB;
                        if (drainVal > 0) {
                            if (activeBuf === 'A') {
                                setBufferA(v => { const n = Math.max(0, v - 2.5); if (n === 0) { setStats(s => ({ ...s, transferred: s.transferred + 1 })); if (isDouble) setActiveBuf('B'); else setIsDraining(false); } return n; });
                            } else {
                                setBufferB(v => { const n = Math.max(0, v - 2.5); if (n === 0) { setStats(s => ({ ...s, transferred: s.transferred + 1 })); if (isDouble) setActiveBuf('A'); } return n; });
                            }
                        } else if (isDouble) {
                            if (activeBuf === 'A' && bufferB >= 100) setActiveBuf('B');
                            else if (activeBuf === 'B' && bufferA >= 100) setActiveBuf('A');
                        }
                    }, 100);
                } else setCpuState('IDLE');
                return () => clearInterval(timer);
            }, [isRunning, bufferA, bufferB, activeBuf, isDouble, isDraining]);

            const reset = () => { setBufferA(0); setBufferB(0); setStats({ transferred: 0, wait: 0 }); setIsRunning(false); setIsDraining(false); setActiveBuf('A'); };

            return (
                <div className="p-8 flex flex-col lg:flex-row gap-8">
                    <div className="w-full lg:w-1/3 space-y-6">
                        <section>
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="Layers" className="text-indigo-600" /> Buffering</h3>
                            <div className="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => { setIsDouble(false); reset(); }} className={`py-2 rounded ${!isDouble ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Single</button>
                                <button onClick={() => { setIsDouble(true); reset(); }} className={`py-2 rounded ${isDouble ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Double</button>
                            </div>
                        </section>
                        <button onClick={() => setIsRunning(!isRunning)} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">{isRunning ? 'Pause' : 'Start'}</button>
                        <div className="bg-slate-50 p-4 rounded-xl space-y-2">
                            <div className="flex justify-between text-sm"><span>CPU Wait:</span> <span className="text-red-500 font-bold">{stats.wait}</span></div>
                            <div className="flex justify-between text-sm"><span>Transferred:</span> <span className="text-indigo-600 font-bold">{stats.transferred}</span></div>
                        </div>
                    </div>
                    <div className="flex-1 bg-slate-50/50 rounded-3xl p-8 border flex items-center justify-between h-64">
                        <div className="text-center w-24">
                            <div className={`p-4 rounded-2xl ${cpuState === 'FILLING' ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}`}><Icon name="Cpu" size={32} /></div>
                            <p className="text-[10px] mt-1 font-bold">{cpuState}</p>
                        </div>
                        <div className="flex flex-col gap-4">
                            <div className="w-32 h-10 border bg-white rounded-lg overflow-hidden relative">
                                <div className="h-full bg-indigo-400" style={{ width: `${bufferA}%` }}></div>
                                {((activeBuf === 'A' && bufferA > 0) || (!isDouble && isDraining)) && <div className="absolute inset-0 flex items-center justify-center text-[8px] font-bold animate-pulse">DRAINING</div>}
                            </div>
                            {isDouble && <div className="w-32 h-10 border bg-white rounded-lg overflow-hidden relative">
                                <div className="h-full bg-indigo-400" style={{ width: `${bufferB}%` }}></div>
                                {(activeBuf === 'B' && bufferB > 0) && <div className="absolute inset-0 flex items-center justify-center text-[8px] font-bold animate-pulse">DRAINING</div>}
                            </div>}
                        </div>
                        <div className="text-center w-24">
                            <div className={`p-4 rounded-2xl ${isRunning && ((activeBuf === 'A' && bufferA > 0) || (activeBuf === 'B' && bufferB > 0)) ? 'bg-amber-600 text-white' : 'bg-slate-200'}`}><Icon name="Printer" size={32} /></div>
                            <p className="text-[10px] mt-1 font-bold">PRINTER</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Scheduling Lab Component ---
        const SchedulingLab = () => {
            const [procs, setProcs] = useState([
                { id: 1, name: 'Task A', status: 'ready', progress: 0, color: 'bg-blue-500' },
                { id: 2, name: 'Task B', status: 'ready', progress: 0, color: 'bg-emerald-500' },
                { id: 3, name: 'Task C', status: 'ready', progress: 0, color: 'bg-purple-500' },
            ]);
            const [queue, setQueue] = useState([1, 2, 3]);
            const [isRunning, setIsRunning] = useState(false);

            useEffect(() => {
                let timer;
                if (isRunning) {
                    timer = setInterval(() => {
                        setProcs(prev => {
                            const next = [...prev];
                            const cur = next.find(p => p.status === 'running');
                            if (!cur) {
                                if (queue.length > 0) {
                                    const target = next.find(p => p.id === queue[0]);
                                    if (target) { target.status = 'running'; setQueue(q => q.slice(1)); }
                                }
                                return next;
                            }
                            cur.progress += 5;
                            if (cur.progress >= 100) cur.status = 'completed';
                            else if (Math.random() < 0.1) { cur.status = 'blocked'; }
                            else if (Math.random() < 0.2) { cur.status = 'ready'; setQueue(q => [...q, cur.id]); }
                            return next;
                        });
                        setProcs(prev => prev.map(p => {
                            if (p.status === 'blocked' && Math.random() < 0.2) { setQueue(q => [...q, p.id]); return { ...p, status: 'ready' }; }
                            return p;
                        }));
                    }, 800);
                }
                return () => clearInterval(timer);
            }, [isRunning, queue]);

            const Col = ({ title, items }) => (
                <div className="bg-slate-50 p-4 rounded-xl border min-h-[250px]">
                    <h4 className="text-center font-bold text-slate-400 text-xs mb-4 uppercase">{title}</h4>
                    <div className="space-y-2">
                        {items.map(p => (
                            <div key={p.id} className="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                                <p className="text-[10px] font-bold mb-1">{p.name} ({p.progress}%)</p>
                                <div className="h-1 bg-slate-100 rounded-full overflow-hidden"><div className={`${p.color} h-full transition-all`} style={{ width: `${p.progress}%` }}></div></div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="p-8">
                    <div className="flex justify-between mb-6">
                        <h3 className="text-lg font-bold">Scheduler</h3>
                        <button onClick={() => setIsRunning(!isRunning)} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">{isRunning ? 'Stop' : 'Start'}</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <Col title="Ready" items={procs.filter(p => p.status === 'ready')} />
                        <Col title="Running" items={procs.filter(p => p.status === 'running')} />
                        <Col title="Blocked" items={procs.filter(p => p.status === 'blocked')} />
                        <Col title="Done" items={procs.filter(p => p.status === 'completed')} />
                    </div>
                </div>
            );
        };

        const Main = () => {
            const [tab, setTab] = useState('memory');
            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto text-center mb-8">
                        <h1 className="text-3xl font-bold text-indigo-700 mb-2">A-Level OS Concepts Lab</h1>
                        <div className="flex justify-center gap-4 mt-6">
                            <button onClick={() => setTab('memory')} className={`px-6 py-2 rounded-full font-bold ${tab === 'memory' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border'}`}>Memory</button>
                            <button onClick={() => setTab('buffering')} className={`px-6 py-2 rounded-full font-bold ${tab === 'buffering' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border'}`}>Buffer</button>
                            <button onClick={() => setTab('scheduling')} className={`px-6 py-2 rounded-full font-bold ${tab === 'scheduling' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border'}`}>Scheduler</button>
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl border overflow-hidden">
                        {tab === 'memory' && <MemoryLab />}
                        {tab === 'buffering' && <BufferLab />}
                        {tab === 'scheduling' && <SchedulingLab />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
