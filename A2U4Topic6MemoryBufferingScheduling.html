<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Level OS Concepts Lab</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX Transpilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes slide-right { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .animate-slide-right { animation: slide-right 2s linear infinite; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Fixed Icon Helper ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    // Lucide.createIcons searches for data-lucide attributes
                    ref.current.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2'));
                    lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            // We use an <i> tag as is standard for Lucide CDN usage
            return <i ref={ref} className="inline-block" />;
        };

        const TOTAL_RAM = 1024;
        const FIXED_SLOT_SIZE = 128;

        // --- Memory Lab Component ---
        const MemoryLab = () => {
            const [mode, setMode] = useState('fixed');
            const [processes, setProcesses] = useState([]);
            const [inputSize, setInputSize] = useState(100);
            const [error, setError] = useState('');

            const addProcess = () => {
                setError('');
                if (inputSize <= 0) return;
                
                if (mode === 'fixed') {
                    if (inputSize > FIXED_SLOT_SIZE) {
                        setError(`Process too large! Max slot size is ${FIXED_SLOT_SIZE}MB.`);
                        return;
                    }
                    const occupied = processes.map(p => p.slotIndex);
                    let target = -1;
                    for (let i = 0; i < 8; i++) {
                        if (!occupied.includes(i)) { target = i; break; }
                    }
                    if (target === -1) {
                        setError('No free partitions available!');
                    } else {
                        setProcesses([...processes, { id: Date.now(), size: inputSize, slotIndex: target }]);
                    }
                } else {
                    const sorted = [...processes].sort((a, b) => a.offset - b.offset);
                    let offset = 0;
                    let placed = false;
                    for (let p of sorted) {
                        if (p.offset - offset >= inputSize) {
                            setProcesses([...processes, { id: Date.now(), size: inputSize, offset }]);
                            placed = true;
                            break;
                        }
                        offset = p.offset + p.size;
                    }
                    if (!placed) {
                        if (TOTAL_RAM - offset >= inputSize) {
                            setProcesses([...processes, { id: Date.now(), size: inputSize, offset }]);
                        } else {
                            setError('External Fragmentation: Insufficient contiguous space!');
                        }
                    }
                }
            };

            const defragment = () => {
                let offset = 0;
                const sorted = [...processes].sort((a, b) => a.offset - b.offset);
                setProcesses(sorted.map(p => {
                    const newP = { ...p, offset };
                    offset += p.size;
                    return newP;
                }));
            };

            return (
                <div className="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="space-y-6">
                        <section>
                            <h3 className="text-lg font-bold mb-3 flex items-center gap-2">
                                <Icon name="Database" className="text-indigo-600" /> Allocation Method
                            </h3>
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => {setMode('fixed'); setProcesses([]);}} className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${mode === 'fixed' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Fixed</button>
                                <button onClick={() => {setMode('dynamic'); setProcesses([]);}} className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${mode === 'dynamic' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Dynamic</button>
                            </div>
                        </section>
                        <section className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <h3 className="font-bold mb-3 text-sm text-slate-400 uppercase tracking-wider">Add Process</h3>
                            <div className="flex gap-2">
                                <div className="relative flex-1">
                                    <input type="number" value={inputSize} onChange={e => setInputSize(Number(e.target.value))} className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Size" />
                                    <span className="absolute right-3 top-2 text-slate-400 text-sm">MB</span>
                                </div>
                                <button onClick={addProcess} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors">Load</button>
                            </div>
                            {error && <p className="text-red-500 text-[10px] mt-2 italic font-medium">{error}</p>}
                        </section>
                        {mode === 'dynamic' && (
                            <button onClick={defragment} className="w-full py-3 border-2 border-dashed border-indigo-200 text-indigo-600 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-50 transition-all">
                                <Icon name="RotateCcw" /> Defragment RAM
                            </button>
                        )}
                        <div className="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-xl">
                             <p className="text-[11px] text-blue-800 leading-relaxed italic">
                                {mode === 'fixed' 
                                    ? "Internal fragmentation: The process is smaller than the fixed block, leaving wasted space inside the partition."
                                    : "External fragmentation: Total free space exists, but it's split into small, non-contiguous blocks."}
                             </p>
                        </div>
                    </div>
                    <div className="lg:col-span-2 relative w-full h-[450px] bg-slate-200 rounded-xl overflow-hidden border-2 border-slate-300 ring-4 ring-slate-100">
                        {mode === 'fixed' ? (
                            <div className="grid grid-rows-8 h-full">
                                {Array.from({ length: 8 }).map((_, i) => {
                                    const p = processes.find(p => p.slotIndex === i);
                                    return (
                                        <div key={i} className="border-b border-slate-300 relative group bg-white/50">
                                            <div className="absolute left-2 top-1 text-[9px] text-slate-400 font-mono">Slot {i+1}</div>
                                            {p ? (
                                                <div className="h-full flex">
                                                    <div style={{ width: `${(p.size / 128) * 100}%` }} className="bg-indigo-500 h-full flex items-center justify-between px-4 text-white font-bold text-xs shadow-inner">
                                                        <span>P_{p.id.toString().slice(-3)}</span>
                                                        <button onClick={() => setProcesses(processes.filter(x => x.id !== p.id))} className="hover:text-red-200 transition-colors"><Icon name="Trash2" size={14} /></button>
                                                    </div>
                                                    {p.size < 128 && (
                                                        <div className="flex-1 bg-red-100 flex items-center justify-center text-[10px] text-red-400 font-black tracking-tight">INTERNAL FRAG</div>
                                                    )}
                                                </div>
                                            ) : <div className="h-full flex items-center justify-center text-slate-300 text-xs italic">Empty Partition</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="h-full relative">
                                {processes.map(p => (
                                    <div key={p.id} style={{ top: `${(p.offset / 1024) * 100}%`, height: `${(p.size / 1024) * 100}%` }} className="absolute left-0 right-0 bg-indigo-500 border-b border-indigo-600 flex items-center justify-between px-4 text-white font-bold text-sm shadow-md">
                                        <span className="font-mono text-[10px] text-indigo-200">@{p.offset}MB</span>
                                        <span>Process {p.id.toString().slice(-3)} ({p.size}MB)</span>
                                        <button onClick={() => setProcesses(processes.filter(x => x.id !== p.id))} className="hover:text-red-200"><Icon name="Trash2" /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Buffer Lab Component ---
        const BufferLab = () => {
            const [isDouble, setIsDouble] = useState(false);
            const [bufferA, setBufferA] = useState(0);
            const [bufferB, setBufferB] = useState(0);
            const [activeBuf, setActiveBuf] = useState('A');
            const [isRunning, setIsRunning] = useState(false);
            const [isDraining, setIsDraining] = useState(false);
            const [cpuState, setCpuState] = useState('IDLE');
            const [stats, setStats] = useState({ transferred: 0, wait: 0 });

            useEffect(() => {
                let timer;
                if (isRunning) {
                    timer = setInterval(() => {
                        // --- PRODUCER (CPU) LOGIC ---
                        if (!isDouble) {
                            if (!isDraining && bufferA < 100) {
                                setCpuState('FILLING');
                                setBufferA(v => {
                                    const n = v + 5;
                                    if (n >= 100) setIsDraining(true);
                                    return Math.min(100, n);
                                });
                            } else {
                                setCpuState('WAITING');
                                setStats(s => ({ ...s, wait: s.wait + 1 }));
                            }
                        } else {
                            const target = activeBuf === 'A' ? 'B' : 'A';
                            const val = target === 'A' ? bufferA : bufferB;
                            if (val < 100) {
                                setCpuState('FILLING');
                                if (target === 'A') setBufferA(v => Math.min(100, v + 5));
                                else setBufferB(v => Math.min(100, v + 5));
                            } else {
                                setCpuState('WAITING');
                                setStats(s => ({ ...s, wait: s.wait + 1 }));
                            }
                        }

                        // --- CONSUMER (Printer) LOGIC ---
                        const currentDrainVal = activeBuf === 'A' ? bufferA : bufferB;
                        if (currentDrainVal > 0) {
                            const drainAmt = 2.5;
                            if (activeBuf === 'A') {
                                setBufferA(v => {
                                    const next = Math.max(0, v - drainAmt);
                                    if (next === 0) {
                                        setStats(s => ({ ...s, transferred: s.transferred + 1 }));
                                        if (isDouble) setActiveBuf('B');
                                        else setIsDraining(false);
                                    }
                                    return next;
                                });
                            } else {
                                setBufferB(v => {
                                    const next = Math.max(0, v - drainAmt);
                                    if (next === 0) {
                                        setStats(s => ({ ...s, transferred: s.transferred + 1 }));
                                        if (isDouble) setActiveBuf('A');
                                    }
                                    return next;
                                });
                            }
                        } else if (isDouble) {
                            // Check for swap if active is empty
                            if (activeBuf === 'A' && bufferB >= 100) setActiveBuf('B');
                            else if (activeBuf === 'B' && bufferA >= 100) setActiveBuf('A');
                        }
                    }, 100);
                } else {
                    setCpuState('IDLE');
                }
                return () => clearInterval(timer);
            }, [isRunning, bufferA, bufferB, activeBuf, isDouble, isDraining]);

            const reset = () => {
                setIsRunning(false);
                setBufferA(0);
                setBufferB(0);
                setStats({ transferred: 0, wait: 0 });
                setActiveBuf('A');
                setIsDraining(false);
                setCpuState('IDLE');
            };

            return (
                <div className="p-8 flex flex-col lg:flex-row gap-8">
                    <div className="w-full lg:w-1/3 space-y-6">
                        <section>
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <Icon name="Layers" className="text-indigo-600" /> Buffering Strategy
                            </h3>
                            <div className="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-lg text-sm">
                                <button onClick={() => {setIsDouble(false); reset();}} className={`py-2 rounded-md font-bold transition-all ${!isDouble ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Single Buffer</button>
                                <button onClick={() => {setIsDouble(true); reset();}} className={`py-2 rounded-md font-bold transition-all ${isDouble ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Double Buffer</button>
                            </div>
                        </section>
                        <button onClick={() => setIsRunning(!isRunning)} className={`w-full py-3 rounded-xl font-bold text-white shadow-lg transition-all ${isRunning ? 'bg-amber-500 shadow-amber-100' : 'bg-green-600 shadow-green-100'}`}>
                            {isRunning ? 'PAUSE' : 'START SIMULATION'}
                        </button>
                        <button onClick={reset} className="w-full py-2 bg-slate-200 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-300">RESET ALL</button>
                        
                        <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Live Performance</h4>
                            <div className="space-y-4">
                                <div>
                                    <div className="flex justify-between text-xs mb-1 font-bold">
                                        <span className="text-slate-500">CPU WAIT CYCLES</span>
                                        <span className="text-red-500 font-mono">{stats.wait}</span>
                                    </div>
                                    <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
                                        <div className="h-full bg-red-500 transition-all duration-300" style={{ width: `${Math.min(100, stats.wait / 2)}%` }}></div>
                                    </div>
                                </div>
                                <div className="flex justify-between text-xs pt-2 border-t border-slate-200 font-bold">
                                    <span className="text-slate-500">TOTAL TRANSFERRED</span>
                                    <span className="text-indigo-600 font-mono">{stats.transferred}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 bg-slate-50/50 rounded-3xl p-8 border-2 border-slate-100 flex items-center justify-between h-72">
                        <div className="flex flex-col items-center gap-3 w-28">
                            <div className={`p-6 rounded-3xl transition-all duration-300 shadow-xl ${cpuState === 'FILLING' ? 'bg-indigo-600 text-white shadow-indigo-100 scale-110' : cpuState === 'WAITING' ? 'bg-red-100 text-red-500 border-2 border-red-200' : 'bg-slate-200 text-slate-400 shadow-none'}`}>
                                <Icon name="Cpu" size={40} className={cpuState === 'FILLING' ? 'animate-pulse' : ''} />
                            </div>
                            <span className={`text-[10px] font-black uppercase tracking-tighter ${cpuState === 'WAITING' ? 'text-red-600' : 'text-slate-500'}`}>{cpuState}</span>
                        </div>

                        <div className="flex flex-col gap-6 w-48">
                            <div className={`relative h-20 border-4 rounded-2xl overflow-hidden transition-all duration-300 ${(!isDouble || activeBuf === 'A') ? 'border-indigo-500 bg-white shadow-lg' : 'border-slate-200 opacity-30'}`}>
                                <div className="absolute inset-y-0 left-0 bg-indigo-500 transition-all duration-100" style={{ width: `${bufferA}%` }}></div>
                                <div className="absolute inset-0 flex flex-col items-center justify-center z-10">
                                    <span className="text-[9px] font-black uppercase text-slate-800">Buffer A</span>
                                    {((activeBuf === 'A' && bufferA > 0) || (!isDouble && isDraining)) && <span className="text-[8px] font-bold bg-indigo-100 text-indigo-700 px-1 rounded animate-pulse">DRAINING</span>}
                                </div>
                            </div>
                            {isDouble && (
                                <div className={`relative h-20 border-4 rounded-2xl overflow-hidden transition-all duration-300 ${activeBuf === 'B' ? 'border-indigo-500 bg-white shadow-lg' : 'border-slate-200 opacity-30'}`}>
                                    <div className="absolute inset-y-0 left-0 bg-indigo-500 transition-all duration-100" style={{ width: `${bufferB}%` }}></div>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center z-10">
                                        <span className="text-[9px] font-black uppercase text-slate-800">Buffer B</span>
                                        {(activeBuf === 'B' && bufferB > 0) && <span className="text-[8px] font-bold bg-indigo-100 text-indigo-700 px-1 rounded animate-pulse">DRAINING</span>}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col items-center gap-3 w-28">
                            <div className={`p-6 rounded-3xl transition-all duration-300 shadow-xl ${isRunning && ((activeBuf === 'A' && bufferA > 0) || (activeBuf === 'B' && bufferB > 0)) ? 'bg-amber-600 text-white shadow-amber-100 scale-105' : 'bg-slate-200 text-slate-400 shadow-none'}`}>
                                <Icon name="Printer" size={40} />
                            </div>
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-tighter">Printer</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Scheduling Lab Component ---
        const SchedulingLab = () => {
            const [procs, setProcs] = useState([
                { id: 1, name: 'Task A', status: 'ready', progress: 0, color: 'bg-blue-500' },
                { id: 2, name: 'Task B', status: 'ready', progress: 0, color: 'bg-emerald-500' },
                { id: 3, name: 'Task C', status: 'ready', progress: 0, color: 'bg-purple-500' },
            ]);
            const [queue, setQueue] = useState([1, 2, 3]);
            const [isRunning, setIsRunning] = useState(false);

            useEffect(() => {
                let timer;
                if (isRunning) {
                    timer = setInterval(() => {
                        setProcs(prev => {
                            const next = [...prev];
                            const curIdx = next.findIndex(p => p.status === 'running');
                            
                            if (curIdx === -1) {
                                if (queue.length > 0) {
                                    const headId = queue[0];
                                    const target = next.find(p => p.id === headId);
                                    if (target) {
                                        target.status = 'running';
                                        setQueue(q => q.slice(1));
                                    }
                                }
                                return next;
                            }

                            const cur = next[curIdx];
                            cur.progress += 4;
                            if (cur.progress >= 100) {
                                cur.status = 'completed';
                            } else if (Math.random() < 0.08) {
                                cur.status = 'blocked';
                            } else if (Math.random() < 0.2) {
                                cur.status = 'ready';
                                setQueue(q => [...q, cur.id]);
                            }
                            return next;
                        });

                        setProcs(prev => {
                            const next = [...prev];
                            next.forEach(p => {
                                if (p.status === 'blocked' && Math.random() < 0.15) {
                                    p.status = 'ready';
                                    setQueue(q => [...q, p.id]);
                                }
                            });
                            return next;
                        });
                    }, 800);
                }
                return () => clearInterval(timer);
            }, [isRunning, queue]);

            const Col = ({ title, items, icon }) => (
                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 min-h-[350px] shadow-sm">
                    <h4 className="text-center font-black text-slate-400 text-[10px] mb-6 uppercase tracking-widest flex items-center justify-center gap-2">
                       <Icon name={icon} size={12} /> {title}
                    </h4>
                    <div className="space-y-3">
                        {items.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-xs font-black text-slate-700">{p.name}</span>
                                    <span className="text-[9px] font-mono font-bold text-slate-400">{p.progress}%</span>
                                </div>
                                <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className={`${p.color} h-full transition-all duration-500 shadow-sm`} style={{ width: `${p.progress}%` }}></div>
                                </div>
                            </div>
                        ))}
                        {items.length === 0 && <div className="text-center text-[10px] text-slate-300 italic pt-10">Empty</div>}
                    </div>
                </div>
            );

            return (
                <div className="p-8">
                    <div className="flex justify-between items-center mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div>
                            <h3 className="text-xl font-black text-indigo-700 uppercase tracking-tighter">Process Scheduler</h3>
                            <p className="text-xs text-slate-500 font-medium italic">Syllabus Section 6.4.2</p>
                        </div>
                        <button onClick={() => setIsRunning(!isRunning)} className={`px-10 py-3 rounded-xl font-black shadow-lg transition-all ${isRunning ? 'bg-amber-500 shadow-amber-100' : 'bg-indigo-600 shadow-indigo-100 text-white'}`}>
                            {isRunning ? 'STOP OS' : 'BOOT SYSTEM'}
                        </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <Col title="Ready" items={procs.filter(p => p.status === 'ready')} icon="ListOrdered" />
                        <Col title="Running" items={procs.filter(p => p.status === 'running')} icon="Zap" />
                        <Col title="Blocked" items={procs.filter(p => p.status === 'blocked')} icon="Clock" />
                        <Col title="Done" items={procs.filter(p => p.status === 'completed')} icon="CheckCircle" />
                    </div>
                </div>
            );
        };

        const Main = () => {
            const [tab, setTab] = useState('memory');
            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto text-center mb-10">
                        <h1 className="text-4xl font-black text-indigo-800 mb-2 tracking-tighter">OS CONCEPTS LAB</h1>
                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em]">Syllabus Sections 6.3 & 6.4</p>
                        <div className="flex justify-center gap-3 mt-8">
                            <button onClick={() => setTab('memory')} className={`px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${tab === 'memory' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-white border-2 border-slate-100 text-slate-400 hover:bg-slate-50'}`}>Memory</button>
                            <button onClick={() => setTab('buffering')} className={`px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${tab === 'buffering' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-white border-2 border-slate-100 text-slate-400 hover:bg-slate-50'}`}>Buffering</button>
                            <button onClick={() => setTab('scheduling')} className={`px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${tab === 'scheduling' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-white border-2 border-slate-100 text-slate-400 hover:bg-slate-50'}`}>Scheduling</button>
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl border-4 border-slate-50 overflow-hidden min-h-[600px]">
                        {tab === 'memory' && <MemoryLab />}
                        {tab === 'buffering' && <BufferLab />}
                        {tab === 'scheduling' && <SchedulingLab />}
                    </div>
                    <div className="max-w-6xl mx-auto mt-12 text-center">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Interactive Resource for A-Level Computer Science</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
