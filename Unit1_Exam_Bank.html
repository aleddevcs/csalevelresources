<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Technology Unit 1 – Question Bank</title>
<style>
  :root {
    --blue: #1e3a5f;
    --blue-mid: #2c5282;
    --blue-light: #ebf4ff;
    --blue-accent: #3182ce;
    --teal: #2b6cb0;
    --green: #276749;
    --green-light: #f0fff4;
    --green-border: #c6f6d5;
    --amber: #7b341e;
    --amber-light: #fffaf0;
    --amber-border: #fbd38d;
    --grey: #4a5568;
    --grey-light: #f7fafc;
    --border: #e2e8f0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    line-height: 1.65;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
    color: #fff;
    padding: 32px 40px 28px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.3px; }
  header p  { font-size: 0.95rem; opacity: 0.8; margin-top: 4px; }

  /* ── Controls ── */
  #controls {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  #controls label { font-size: 0.85rem; font-weight: 600; color: var(--grey); }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-btn {
    padding: 6px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--grey);
    transition: all .18s;
  }
  .filter-btn:hover { border-color: var(--blue-accent); color: var(--blue-accent); }
  .filter-btn.active { background: var(--blue-accent); border-color: var(--blue-accent); color: #fff; }

  #search-box {
    margin-left: auto;
    padding: 7px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    font-size: 0.85rem;
    width: 220px;
    outline: none;
    transition: border .18s;
  }
  #search-box:focus { border-color: var(--blue-accent); }

  .btn-toggle-all {
    padding: 6px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--grey);
    transition: all .18s;
  }
  .btn-toggle-all:hover { border-color: var(--green); color: var(--green); }

  .filter-select {
    padding: 7px 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: #fff;
    font-size: 0.82rem;
    color: var(--grey);
    min-width: 190px;
    outline: none;
  }
  .filter-select:focus { border-color: var(--blue-accent); }
  .select-group { flex-wrap: nowrap; }

  /* ── Main ── */
  main { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── Stats bar ── */
  #stats { font-size: 0.83rem; color: var(--grey); margin-bottom: 20px; }

  /* ── Question Card ── */
  .question-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: box-shadow .2s;
  }
  .question-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.11); }

  .card-header {
    background: var(--blue);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: var(--blue-mid); }
  .q-number {
    font-size: 1.05rem;
    font-weight: 800;
    white-space: nowrap;
    background: rgba(255,255,255,0.15);
    padding: 2px 10px;
    border-radius: 12px;
    min-width: 54px;
    text-align: center;
  }
  .q-title { flex: 1; font-size: 0.97rem; font-weight: 600; padding-top: 2px; }
  .q-meta { font-size: 0.78rem; opacity: 0.75; display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .q-meta span { background: rgba(255,255,255,0.12); padding: 1px 8px; border-radius: 10px; }
  .chevron { font-size: 1rem; opacity: 0.7; transition: transform .25s; margin-left: 8px; flex-shrink: 0; padding-top: 2px; }
  .card-header.open .chevron { transform: rotate(180deg); }

  .card-body { display: none; }
  .card-body.open { display: block; }

  /* ── Sections inside card ── */
  .section {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--blue-accent);
    margin-bottom: 8px;
  }

  /* Context */
  .context-box {
    background: var(--amber-light);
    border-left: 4px solid #ed8936;
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.92rem;
    color: var(--amber);
  }

  /* Question */
  .question-text { font-size: 0.97rem; color: #1a202c; }
  .question-text p { margin-bottom: 8px; }
  .parts { margin-top: 10px; }
  .part { display: flex; gap: 10px; margin-bottom: 6px; }
  .part-label { font-weight: 700; color: var(--blue-mid); min-width: 24px; }
  .part-text { flex: 1; }

  /* Mark scheme toggle */
  .ms-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: var(--green-light);
    border-bottom: 1px solid var(--green-border);
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: 700;
    color: var(--green);
    user-select: none;
    transition: background .15s;
  }
  .ms-toggle:hover { background: #dcffe8; }
  .ms-chevron { font-size: 0.85rem; transition: transform .2s; }
  .ms-toggle.open .ms-chevron { transform: rotate(180deg); }

  .ms-body { display: none; padding: 18px 22px; background: #fafffe; }
  .ms-body.open { display: block; }

  /* Mark scheme content */
  .ms-body h4 { font-size: 0.88rem; font-weight: 700; color: var(--green); margin: 12px 0 6px; }
  .ms-body h4:first-child { margin-top: 0; }
  .ms-body ul { padding-left: 20px; margin-bottom: 8px; }
  .ms-body ul li { margin-bottom: 4px; font-size: 0.9rem; }
  .ms-body p { font-size: 0.9rem; margin-bottom: 8px; }
  .ms-body strong { color: #276749; }
  .ms-body em { color: #553c9a; font-style: italic; }

  /* Band table */
  .band-table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0 6px;
    font-size: 0.84rem;
  }
  .band-table th {
    background: var(--green);
    color: #fff;
    padding: 7px 12px;
    text-align: left;
    font-weight: 700;
  }
  .band-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #c6f6d5;
    vertical-align: top;
  }
  .band-table tr:nth-child(even) td { background: #f0fff4; }
  .band-table tr:last-child td { border-bottom: none; }
  .band-num { font-size: 1.1rem; font-weight: 800; color: var(--green); }
  .marks-badge { font-weight: 700; white-space: nowrap; }

  /* Total marks badge */
  .marks-total {
    display: inline-block;
    background: var(--blue-light);
    color: var(--blue-mid);
    font-weight: 700;
    font-size: 0.82rem;
    padding: 4px 12px;
    border-radius: 12px;
    border: 1px solid #bee3f8;
  }

  /* Metadata */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    font-size: 0.83rem;
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-key { font-weight: 700; color: var(--grey); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-val { color: #2d3748; }

  /* Year badge colours */
  .year-2023 .card-header { background: #2d3748; }
  .year-2023 .card-header:hover { background: #4a5568; }
  .year-2025 .card-header { background: #553c9a; }
  .year-2025 .card-header:hover { background: #6b46c1; }

  /* Hidden */
  .hidden { display: none !important; }

  /* No results */
  #no-results { text-align: center; color: var(--grey); padding: 40px; font-size: 1rem; display: none; }

  @media (max-width: 600px) {
    header { padding: 20px; }
    header h1 { font-size: 1.3rem; }
    #controls { padding: 12px 16px; }
    main { padding: 16px 12px 40px; }
    #search-box { width: 100%; margin-left: 0; }
  }

  /* ── Revision checklist ── */
  #checklist-panel {
    max-width: 960px;
    margin: 18px auto 0;
    padding: 0 24px;
  }
  .checklist-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .checklist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .checklist-header h2 {
    font-size: 1rem;
    color: var(--blue);
    margin: 0;
  }
  .checklist-summary {
    font-size: 0.83rem;
    color: var(--grey);
  }
  .checklist-header .chevron {
    color: var(--grey);
    margin-left: 0;
  }
  .checklist-body { display: none; padding: 16px 20px 20px; }
  .checklist-body.open { display: block; }
  .progress-wrap {
    margin-bottom: 16px;
  }
  .progress-bar {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    overflow: hidden;
    background: #edf2f7;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--blue-accent), var(--green));
    transition: width .2s ease;
  }
  .progress-meta {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--grey);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .checklist-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .checklist-btn {
    padding: 6px 12px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--grey);
  }
  .checklist-btn:hover { border-color: var(--blue-accent); color: var(--blue-accent); }
  .topic-section {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .topic-section-header {
    background: var(--blue-light);
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .topic-section-header h3 {
    font-size: 0.92rem;
    color: var(--blue);
    margin: 0;
  }
  .topic-section-body { display: none; padding: 12px 14px 14px; }
  .topic-section-body.open { display: block; }
  .subtopic-block { margin-bottom: 14px; }
  .subtopic-title {
    font-size: 0.84rem;
    font-weight: 700;
    color: var(--grey);
    margin-bottom: 8px;
  }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px dashed #edf2f7;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input { margin-top: 2px; }
  .check-item label {
    font-size: 0.9rem;
    color: #2d3748;
    cursor: pointer;
    flex: 1;
  }
  .check-item.checked label {
    text-decoration: line-through;
    color: #718096;
  }

</style>
</head>
<body>

<header>
  <h1>Digital Technology – Unit 1 Question Bank</h1>
  <p>Summer 2023 &bull; Summer 2024 &bull; Summer 2025 &nbsp;|&nbsp; All questions and mark schemes</p>
</header>

<div id="controls">
  <div class="filter-group">
    <label>Year:</label>
    <button class="filter-btn active" data-year="all">All</button>
    <button class="filter-btn" data-year="2023">2023</button>
    <button class="filter-btn" data-year="2024">2024</button>
    <button class="filter-btn" data-year="2025">2025</button>
  </div>
  <div class="filter-group select-group">
    <label for="topic-filter">Topic:</label>
    <select id="topic-filter" class="filter-select">
      <option value="all">All topics</option>
    </select>
  </div>
  <div class="filter-group select-group">
    <label for="subtopic-filter">Sub-topic:</label>
    <select id="subtopic-filter" class="filter-select">
      <option value="all">All sub-topics</option>
    </select>
  </div>
<button class="btn-toggle-all" id="expand-all">Expand All</button>
  <button class="btn-toggle-all" id="collapse-all">Collapse All</button>
  <input id="search-box" type="search" placeholder="🔍 Search questions, topics, context…">
</div>


<div id="checklist-panel">
  <div class="checklist-card">
    <div class="checklist-header" id="checklist-toggle">
      <div>
        <h2>Revision checklist</h2>
        <div class="checklist-summary">Students can tick off specification areas they have revised. Progress is saved on this device.</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="checklist-body" id="checklist-body">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="checklist-progress-fill"></div></div>
        <div class="progress-meta">
          <span id="checklist-progress-text">0 of 0 completed</span>
          <span id="checklist-progress-percent">0%</span>
        </div>
      </div>
      <div class="checklist-actions">
        <button class="checklist-btn" id="checklist-expand-all">Expand all topics</button>
        <button class="checklist-btn" id="checklist-collapse-all">Collapse all topics</button>
        <button class="checklist-btn" id="checklist-clear">Clear all ticks</button>
      </div>
      <div id="checklist-container"></div>
    </div>
  </div>
</div>


<main>
  <div id="stats"></div>
  <div id="questions-container"></div>
  <div id="no-results">No questions match your search.</div>
</main>

<script>
const questions = [

/* ═══════════════════════ 2024 ═══════════════════════ */
{
  year: 2024, num: 1,
  title: "Health risks of PC use & touch-sensitive interface evaluation",
  marks: 12,
  topic: "User-centred design, user experience and human-computer interaction",
  subTopic: "Human-computer interaction",
  spec: "2.1.4 (a)",
  context: "Rob is starting a company and will need his employees to sit in front of a desktop PC for up to 7 hours a day.",
  parts: [
    { label: "a", text: "Advise Rob on what health risks can arise from sitting in front of a computer for long periods of time and how these issues can be mitigated." },
    { label: "b", text: "Rob has been advised that a touch sensitive interface is the best option for visitors to use when signing in at reception. Evaluate this advice." }
  ],
  markscheme: `
    <h4>(a) Indicative content:</h4>
    <ul>
      <li><strong>Risks:</strong> Eye strain: dry, irritated eyes, blurred vision, headaches. Neck and back pain: strain on neck, shoulders, and back. Carpal tunnel syndrome: pain, numbness, tingling in hand and fingers.</li>
      <li><strong>To mitigate these risks:</strong> Take regular breaks to stretch and move around. Set up workstation ergonomically (e.g. position monitor at comfortable distance and height, use chair with good lumbar support, keep keyboard and mouse at level that allows wrists to remain straight). Adjust chair and desk to a comfortable position that promotes good posture.</li>
      <li><em>Accept any other reasonable risk and mitigation.</em></li>
    </ul>
    <table class="band-table">
      <tr><th>Band</th><th>AO2</th><th>Content Description</th></tr>
      <tr><td class="band-num">3</td><td class="marks-badge">5–6 marks</td><td>A very good discussion, which shows: • thorough knowledge and understanding of the potential risks of using a PC • a confident grasp of how to mitigate the risks</td></tr>
      <tr><td class="band-num">2</td><td class="marks-badge">3–4 marks</td><td>A good discussion, which shows: • generally secure knowledge and understanding of the potential risks of using a PC • a generally secure understanding of how to mitigate the risks</td></tr>
      <tr><td class="band-num">1</td><td class="marks-badge">1–2 marks</td><td>A basic discussion, which shows: • some knowledge and understanding of the potential risks of using a PC • some grasp of how to mitigate the risks</td></tr>
    </table>
    <h4>(b) Indicative content:</h4>
    <ul>
      <li><strong>Advantages:</strong> User-friendly/Intuitive. No need for a keyboard or mouse. Convenient/Can be adjusted or rotated to suit user. Customisation – Fit a specific need – Designed with clear instructions and simple navigation.</li>
      <li><strong>Disadvantages:</strong> Potential for germs to be transferred. Not all users may be familiar with or comfortable using touchscreens. Can be less accessible for individuals with certain disabilities.</li>
    </ul>
    <table class="band-table">
      <tr><th>Band</th><th>AO2</th><th>Content Description</th></tr>
      <tr><td class="band-num">3</td><td class="marks-badge">5–6 marks</td><td>A very good discussion, which shows: • thorough knowledge and understanding of the advantages and disadvantages of touch sensitive interfaces • a confident grasp of how these apply to company using a touch sensitive interface for guests in reception</td></tr>
      <tr><td class="band-num">2</td><td class="marks-badge">3–4 marks</td><td>A good discussion, which shows: • generally secure knowledge and understanding of the advantages and disadvantages of touch sensitive interfaces • a generally secure understanding of how these apply to company using a touch sensitive interface for guests in reception</td></tr>
      <tr><td class="band-num">1</td><td class="marks-badge">1–2 marks</td><td>A basic discussion, which shows: • some knowledge and understanding of the advantages and disadvantages of touch sensitive interfaces • some grasp of how these apply to company using a touch sensitive interface for guests in reception</td></tr>
    </table>
    <p><strong>Marks:</strong> 12 Marks Total (6 for part a, 6 for part b).</p>
  `
},
{
  year: 2024, num: 2,
  title: "Positive and negative impacts of the Internet of Things (IoT)",
  marks: 6,
  topic: "Connected digital systems and smart devices",
  subTopic: "Impacts of the IoT",
  spec: "2.1.1 (d)",
  context: null,
  question: "Describe the potential positive and negative impacts of the Internet of Things (IoT) on individuals and society.",
  markscheme: `
    <h4>Indicative content:</h4>
    <p><strong>Internet of Things Positive Impacts:</strong> effective communication and Instant messaging services; increase business interactions, save vital time; less complicated banking, transactions, and shopping; access the latest news from anywhere in the world; run online courses on virtual assistants using the Internet; professionals have IoT devices in healthcare, eCommerce, and AI to help in doing jobs easily.</p>
    <p><strong>Internet of Things Negative Impacts:</strong> easy availability of age unsuitable content materials and information; social networks disturb life personally and professionally; stealing data or hacking; using the Internet to spread bad scenarios via the IoT device is relatively easy; potential loss of privacy and security through the collection and sharing of personal data; increased dependence on technology and potential loss of personal skills and knowledge; the potential for job loss and economic disruption due to automation and other technological changes; the potential for overreliance on technology and the resulting impact on human relationships and social interaction.</p>
    <table class="band-table">
      <tr><th>Band</th><th>AO1</th><th>Content Description</th></tr>
      <tr><td class="band-num">3</td><td class="marks-badge">5–6 marks</td><td>A very good description, which shows: • thorough knowledge and understanding of the potential positive and negative impacts of the Internet of Things (IoT) • a confident grasp of how these would impact individuals and society</td></tr>
      <tr><td class="band-num">2</td><td class="marks-badge">3–4 marks</td><td>A good description, which shows: • generally secure knowledge and understanding of the potential positive and negative impacts of the Internet of Things (IoT) • a generally secure understanding of how these would impact individuals and society</td></tr>
      <tr><td class="band-num">1</td><td class="marks-badge">1–2 marks</td><td>A basic description, which shows: • some knowledge and understanding of the potential positive or negative impacts of the Internet of Things (IoT) • some grasp of how these would impact individuals or society</td></tr>
    </table>
    <p><strong>Marks:</strong> 6 Marks Total.</p>
  `
},
{
  year: 2024, num: 3,
  title: "Machine Learning vs traditional AI & types of ML learning",
  marks: 9,
  topic: "The development of Artificial Intelligence",
  subTopic: "Machine Learning (ML)",
  spec: "2.1.2 (b)",
  context: "Machine Learning is a subset of Artificial Intelligence.",
  parts: [
    { label: "a", text: "Describe Machine Learning and how it differs from traditional algorithms used in Artificial Intelligence." },
    { label: "b", text: "Describe supervised, semi-supervised, and unsupervised learning within the context of Machine Learning." }
  ],
  markscheme: `
    <h4>(a) Machine Learning vs Traditional AI:</h4>
    <ul>
      <li><strong>Award one mark for a limited response, for example:</strong> Machine Learning (ML) is where the machine learns from experience.</li>
      <li><strong>Award two marks for a basic response, for example:</strong> ML algorithms are able to learn from data and experience. In contrast, traditional algorithms used in AI are based on certainties and not probabilities.</li>
      <li><strong>Award three marks for a more developed response, for example:</strong> Machine Learning (ML) algorithms can adapt without following explicit instructions. ML algorithms are able to learn from data and experience, allowing them to make predictions and decisions without being explicitly programmed to do so. In contrast, traditional algorithms used in AI are based on pre-set instructions that are not able to adapt or improve based on new data or experiences.</li>
    </ul>
    <h4>(b) Indicative content:</h4>
    <ul>
      <li><strong>Supervised learning:</strong> The training data is labelled with the correct output, and the algorithm learns to predict the correct output for new data based on the patterns it discovers in the training data.</li>
      <li><strong>Semi-supervised learning:</strong> The training data is partially labelled, with some examples having the correct output and others not. The algorithm is still able to learn from this data, but it may not be able to perform as well as it would with fully labelled data. Feedback is an important component in semi-supervised learning.</li>
      <li><strong>Unsupervised learning:</strong> The training data is not labelled at all, and the algorithm must discover the underlying patterns in the data on its own. This is often more challenging than supervised or semi-supervised learning, but it can be useful for finding hidden structures in the data.</li>
    </ul>
    <table class="band-table">

      <li><strong>Big Bang:</strong> The Big Bang Model comprises focusing all the possible resources in software development and coding, with very little or no planning. <strong>Advantage:</strong> With this method, all the steps of a project are done at once. It works best for small projects with clear requirements / this model is ideal for repetitive or small projects with minimum risks. <strong>Disadvantage:</strong> It requires a lot of coordination and resource allocation, it might not work for bigger or more complicated projects. It is a very high-risk model and can turn out to be very expensive if requirements are misunderstood.</li>

    { label: "a", text: "Name the four main methods." },
    { label: "b", text: "Describe two of the methods, giving one advantage and one disadvantage for each." }

  markscheme: `
    <h4>(a) Four methods:</h4>
    <p>Parallel, Phased, Pilot, Direct (1 mark each).</p>
    <h4>(b) Indicative content:</h4>
    <ul>
      <li><strong>Parallel:</strong> Old and new systems are run at the same time causing duplication of all tasks, while the new system is checked to ensure consistency. <strong>Advantage:</strong> If one fails there is a backup. The safest method of changeover. <strong>Disadvantage:</strong> Duplication of effort so not something you'd want to do for a long time. Additional cost of running multiple systems concurrently.</li>
      <li><strong>Phased:</strong> Initially, only part of the new system is deployed with the rest still on the old system. As the new parts are accepted the old is phased out. <strong>Advantage:</strong> Works well with RAD (Rapid Application Deployment). <strong>Disadvantage:</strong> Requires the old system to work with the new system.</li>
      <li><strong>Pilot:</strong> The new system is rolled out to a self-contained branch before being rolled out to the rest. <strong>Advantage:</strong> Only one branch is affected by any problems. <strong>Disadvantage:</strong> Only works if department/branches are almost identical e.g. supermarkets or bank branches. Doesn't work for companies with small numbers of branches/departments.</li>
      <li><strong>Direct:</strong> Also known as the big bang changeover. Change to the new system immediately. <strong>Advantage:</strong> Best option if there's no previous system or the previous system has failed. Quickest changeover method. <strong>Disadvantage:</strong> High risk.</li>
    </ul>
    <table class="band-table">

  markscheme: `
    <h4>(a) Three Main Enablers:</h4>

      <li><strong>Exponential Growth in the Speed of Computers:</strong> When Moore's Law was first proposed, it was thought that the number of transistors on a microchip would double roughly every two years, increasing computer capability. Computers have generally continued to develop faster and more powerful even as Moore's Law has begun to plateau. Real-time analytics and faster data processing are now possible due to faster computing speeds. This is crucial for AI operations like real-time decision-making, picture recognition, and natural language processing. Thanks to faster computers, deep learning methods, which demand a lot of computing power, are now more viable and effective. This has facilitated developments in fields like real-time language translation and autonomous cars.</li>
      <li><strong>Huang's Law:</strong> According to Huang's Law, named after Jensen Huang, the performance of graphics processing units (GPUs) will double around every two years. The parallel processing activities necessary for machine learning and artificial intelligence are particularly well suited to GPUs. Better GPUs have greatly increased the capability of AI algorithms, particularly neural networks. Many of the advances in deep learning have been made possible by GPUs, which have also made it possible to build models that are more complicated and can perform advanced image and speech recognition.</li>
      <li><strong>Cloud Computing:</strong> Cloud computing refers to the delivery of computing services, including storage, processing power, and applications, over the internet. Cloud platforms offer on-demand access to a vast array of resources and services that are crucial for AI development and deployment. They make it easier and more cost-effective to train, deploy, and scale AI models. Startups to large enterprises can now afford to train complex AI models using cloud resources. Services like AWS's SageMaker or Google Cloud AI provide pre-built environments for machine learning, making AI more accessible.</li>

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function parsePartMarks(marks, markscheme, label) {
  const clean = label.toLowerCase().trim();
  const msText = markscheme.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
  const patterns = [
    new RegExp(`(\\d+)\\s+for\\s+part\\s+${escapeRegex(clean)}`, 'i'),
    new RegExp(`(\\d+)\\s+for\\s+${escapeRegex(clean)}`, 'i'),
    new RegExp(`part\\s+${escapeRegex(clean)}\\s*[:\-]?\\s*(\\d+)`, 'i')
  ];
  for (const pattern of patterns) {
    const match = msText.match(pattern);
    if (match) return Number(match[1]);
  }
  if (!/[()]/.test(clean)) {
    const compact = clean.replace(/\s+/g, '');
    const loose = msText.match(new RegExp(`(\\d+)\\s+for\\s+part\\s+${escapeRegex(compact)}`, 'i'));
    if (loose) return Number(loose[1]);
  }
  return null;
}

function extractMarkschemeForPart(markscheme, label) {
  const lowerLabel = label.toLowerCase().trim();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = markscheme;
  const h4s = Array.from(wrapper.querySelectorAll('h4'));
  if (!h4s.length) return markscheme;

  const targetHeading = h4s.find(h => {
    const text = h.textContent.toLowerCase().replace(/\s+/g, ' ').trim();
    return text.includes(`(${lowerLabel})`) ||
           text.startsWith(`${lowerLabel})`) ||
           text.includes(`${lowerLabel}:`) ||
           text.includes(lowerLabel + ' ');
  });

  if (!targetHeading) return markscheme;

  let html = '';
  let node = targetHeading;
  while (node) {
    if (node !== targetHeading && node.tagName === 'H4') break;
    html += node.outerHTML || node.textContent || '';
    node = node.nextElementSibling;
  }
  return html || markscheme;
}

        </div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">
      ${q.context ? `
      <div class="section">
        <div class="section-title">📌 Context</div>
        <div class="context-box">${q.context}</div>
      </div>` : ''}
      <div class="section">
        <div class="section-title">❓ Question</div>
        <div class="question-text">
          <p>${q.question || ''}</p>
        </div>
      </div>
      <div class="ms-toggle" onclick="toggleMS(this)">
        <span>📝 Mark Scheme</span>
        <span style="margin-left:auto; display:flex; align-items:center; gap:6px;">
          <span class="marks-total">${q.marks} marks</span>
          <span class="ms-chevron">▼</span>
        </span>
      </div>
      <div class="ms-body">
        ${q.markscheme}
      </div>
    </div>
  `;
  return card;
}

function toggleCard(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function toggleMS(toggle) {
  toggle.classList.toggle('open');
  toggle.nextElementSibling.classList.toggle('open');
}

const container = document.getElementById('questions-container');
const cards = [];
questionEntries.forEach(q => {
  const card = buildCard(q);
  container.appendChild(card);
  cards.push(card);
});

/* ── Filter & Search ── */
let activeYear = 'all';
let activeTopic = 'all';
let activeSubTopic = 'all';
let searchTerm = '';

const topicFilter = document.getElementById('topic-filter');
const subtopicFilter = document.getElementById('subtopic-filter');

function populateSelect(select, values, placeholder) {
  const current = select.value || 'all';
  select.innerHTML = `<option value="all">${placeholder}</option>` + values.map(v => `<option value="${v}">${v}</option>`).join('');
  const valid = ['all', ...values];
  select.value = valid.includes(current) ? current : 'all';
}


function updateFilterOptions() {
  const yearScoped = questionEntries.filter(q => activeYear === 'all' || String(q.year) === activeYear);
  const topics = [...new Set(yearScoped.map(q => q.topic).filter(Boolean))].sort();
  populateSelect(topicFilter, topics, 'All topics');
  if (activeTopic !== 'all' && !topics.includes(activeTopic)) activeTopic = 'all';
  topicFilter.value = activeTopic;

  const topicScoped = questionEntries.filter(q => (activeYear === 'all' || String(q.year) === activeYear) && (activeTopic === 'all' || q.topic === activeTopic));
  const subtopics = [...new Set(topicScoped.map(q => q.subTopic).filter(Boolean))].sort();
  populateSelect(subtopicFilter, subtopics, 'All sub-topics');
  if (activeSubTopic !== 'all' && !subtopics.includes(activeSubTopic)) activeSubTopic = 'all';
  subtopicFilter.value = activeSubTopic;
}

function updateStats() {
  const visible = cards.filter(c => !c.classList.contains('hidden')).length;
  document.getElementById('stats').textContent = `Showing ${visible} of ${cards.length} examinable entries`;
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

function applyFilters() {
  updateFilterOptions();
  cards.forEach(card => {
    const yearMatch = activeYear === 'all' || card.dataset.year === activeYear;
    const topicMatch = activeTopic === 'all' || card.dataset.topic === activeTopic.toLowerCase();
    const subTopicMatch = activeSubTopic === 'all' || card.dataset.subtopic === activeSubTopic.toLowerCase();
    const searchMatch = !searchTerm || card.dataset.text.includes(searchTerm);
    card.classList.toggle('hidden', !(yearMatch && topicMatch && subTopicMatch && searchMatch));
  });
  updateStats();
}

const checklistStorageKey = 'unit1RevisionChecklistV1';

function slugifyChecklist(value) {
  return value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function getChecklistState() {
  try { return JSON.parse(localStorage.getItem(checklistStorageKey) || '{}'); }
  catch { return {}; }
}

function saveChecklistState(state) {
  localStorage.setItem(checklistStorageKey, JSON.stringify(state));
}

function renderChecklist() {
  const container = document.getElementById('checklist-container');
  const state = getChecklistState();
  container.innerHTML = revisionChecklist.map((topic, topicIndex) => `
    <div class="topic-section">
      <div class="topic-section-header" data-topic-index="${topicIndex}">
        <h3>${topic.topic}</h3>
        <div class="chevron">▼</div>
      </div>
      <div class="topic-section-body ${topicIndex === 0 ? 'open' : ''}">
        ${topic.subtopics.map((sub, subIndex) => `
          <div class="subtopic-block">
            <div class="subtopic-title">${sub.title}</div>
            ${sub.items.map((item, itemIndex) => {
              const id = `${topicIndex}-${subIndex}-${itemIndex}`;
              const checked = !!state[id];
              return `
                <div class="check-item ${checked ? 'checked' : ''}">
                  <input type="checkbox" id="check-${id}" data-check-id="${id}" ${checked ? 'checked' : ''}>
                  <label for="check-${id}">${item}</label>
</div>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  container.querySelectorAll('input[type="checkbox"]').forEach(box => {
    box.addEventListener('change', e => {
      const id = e.target.dataset.checkId;
      const updated = getChecklistState();
      updated[id] = e.target.checked;
      saveChecklistState(updated);
      e.target.closest('.check-item').classList.toggle('checked', e.target.checked);
      updateChecklistProgress();
    });
  });

  container.querySelectorAll('.topic-section-header').forEach(header => {
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    });
  });

  updateChecklistProgress();
}

function updateChecklistProgress() {
  const state = getChecklistState();
  let total = 0;
  let complete = 0;
  revisionChecklist.forEach(topic => topic.subtopics.forEach(sub => sub.items.forEach((_, idx) => total++)));
  Object.values(state).forEach(v => { if (v) complete++; });
  const pct = total ? Math.round((complete / total) * 100) : 0;
  document.getElementById('checklist-progress-fill').style.width = `${pct}%`;
  document.getElementById('checklist-progress-text').textContent = `${complete} of ${total} completed`;
  document.getElementById('checklist-progress-percent').textContent = `${pct}%`;
}

document.getElementById('checklist-toggle').addEventListener('click', () => {
  document.getElementById('checklist-body').classList.toggle('open');
  document.querySelector('#checklist-toggle .chevron').classList.toggle('open');
});

document.getElementById('checklist-expand-all').addEventListener('click', () => {
  document.querySelectorAll('.topic-section-body').forEach(b => b.classList.add('open'));
});
document.getElementById('checklist-collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.topic-section-body').forEach(b => b.classList.remove('open'));
});
document.getElementById('checklist-clear').addEventListener('click', () => {
  localStorage.removeItem(checklistStorageKey);
  renderChecklist();
});
